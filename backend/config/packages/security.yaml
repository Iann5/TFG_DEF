security:
    # 1. Configuración de encriptado
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # 2. Dónde están los usuarios (Base de datos)
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    # 3. Jerarquía de roles
    role_hierarchy:
        ROLE_ADMIN: ['ROLE_USER']
        ROLE_TRABAJADOR: ['ROLE_USER']

    # 4. Cortafuegos (Reglas de entrada)
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        # A. Zona de Login (Aquí se consigue el Token)
        login:
            pattern: ^/api/login
            stateless: true
            json_login:
                check_path: /api/login_check
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure
                username_path: email
                password_path: password

        # B. Zona API (Aquí se usa el Token)
        api:
            pattern: ^/api
            stateless: true
            jwt: ~

    # 5. Control de Acceso (Quién puede ver qué)
    access_control:
        - { path: ^/api/login, roles: PUBLIC_ACCESS } # Login público
        - { path: ^/api/docs, roles: PUBLIC_ACCESS }  # Documentación pública
        - { path: ^/api/contexts, roles: PUBLIC_ACCESS } # Necesario para que Swagger cargue
        - { path: ^/api$, roles: PUBLIC_ACCESS } # (Fíjate en el $) Necesario para que cargue la URL base
        - { path: ^/api/users, roles: PUBLIC_ACCESS, methods: [POST] } # Registro público
        - { path: ^/api/trabajadors, methods: [GET], roles: PUBLIC_ACCESS }  # Ver trabajadores es público
        - { path: ^/api/proyectos, methods: [GET], roles: PUBLIC_ACCESS }    # Ver proyectos es público
        - { path: ^/api/productos, methods: [GET], roles: PUBLIC_ACCESS }    # Ver productos es público
        - { path: ^/api/packs, methods: [GET], roles: PUBLIC_ACCESS }        # Ver packs es público
        - { path: ^/api/valoracion_proyectos, methods: [GET], roles: PUBLIC_ACCESS } # Ver valoraciones es público
        - { path: ^/api/valoracion_productos, methods: [GET], roles: PUBLIC_ACCESS } # Ver valoraciones de productos es público
        - { path: ^/api/valoracion_packs, methods: [GET], roles: PUBLIC_ACCESS }     # Ver valoraciones de packs es público
        - { path: ^/api/valoracion_trabajadors, methods: [GET], roles: PUBLIC_ACCESS } # Ver valoraciones de trabajadores es público
        - { path: ^/api/equipo, methods: [GET], roles: PUBLIC_ACCESS } # Ver equipo es público
        - { path: ^/api/estilos, methods: [GET], roles: PUBLIC_ACCESS } # Ver estilos es público
        - { path: ^/api/admin, roles: ROLE_ADMIN }  # Solo admins
        # Por defecto: cualquier lectura (GET) es pública. Las operaciones sensibles se protegen
        # con security en ApiResource (POST/PATCH/DELETE) o con reglas más específicas arriba.
        - { path: ^/api, methods: [GET], roles: PUBLIC_ACCESS }
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }