server {
    listen 80;
    server_name localhost;

    # Archivos estáticos del build de React
    root /usr/share/nginx/html;
    index index.html;

    # ─── Proxy reverso hacia el backend de Symfony ───────────────────────────
    # Todas las peticiones a /api/* o /media/* se redirigen internamente
    # al contenedor "backend" (nombre del servicio en docker-compose).
    # Esto elimina por completo el problema de CORS: el navegador solo
    # habla con localhost:80, y nginx hace el reenvío internamente.

    location /api/ {
        proxy_pass         http://backend:80/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /media/ {
        proxy_pass         http://backend:80/media/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ─── React Router: evita 404 al recargar una ruta ─────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
