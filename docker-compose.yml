version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: tfg_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped


  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: tfg_backend
    ports:
      - "8000:80"
    environment:
      APP_ENV: dev
      APP_DEBUG: 1
      DATABASE_URL: "mysql://app_user:app_password@db:3306/app_db?serverVersion=8.0&charset=utf8mb4"
    volumes:
      - ./backend:/var/www/symfony
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: mysql:8
    container_name: tfg_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Carga automática del init.sql
      - ./docker/db/data:/docker-entrypoint-initdb.d
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: tfg_phpmyadmin
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8080:80"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  db_data:
